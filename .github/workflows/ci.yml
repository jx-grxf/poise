name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Install Tuist
        run: brew install --quiet tuist

      - name: Resolve dependencies
        run: TUIST_SKIP_UPDATE_CHECK=1 tuist install

      - name: Generate project
        run: TUIST_SKIP_UPDATE_CHECK=1 tuist generate --no-open

      - name: Build
        run: |
          TUIST_SKIP_UPDATE_CHECK=1 tuist xcodebuild build \
            -scheme Poise \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
